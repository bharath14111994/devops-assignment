apiVersion: v1
kind: ConfigMap
metadata:
  name: voting-app-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  voting-app-dashboard.json: |
    {
      "dashboard": {
        "title": "Voting App Dashboard",
        "panels": [
          {
            "title": "Total Votes Cast",
            "type": "stat",
            "targets": [
              {
                "expr": "sum(vote_count_total)"
              }
            ]
          },
          {
            "title": "Votes by Option",
            "type": "piechart",
            "targets": [
              {
                "expr": "sum by(option) (vote_count_total)"
              }
            ]
          },
          {
            "title": "HTTP Requests Total",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(rate(http_requests_total[5m]))"
              }
            ]
          },
          {
            "title": "Pod CPU Usage",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(rate(container_cpu_usage_seconds_total{namespace='default'}[5m])) by (pod)"
              }
            ]
          },
          {
            "title": "Pod Memory Usage",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(container_memory_usage_bytes{namespace='default'}) by (pod)"
              }
            ]
          }
        ]
      }
    }
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: result
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bharath14111994/devops-assignment.git
    targetRevision: HEAD
    path: helm/result
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
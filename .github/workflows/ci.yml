name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Update Helm chart versions
        if: github.ref == 'refs/heads/main'
        run: |
          VERSION="1.0.${{ github.run_number }}"
          sed -i "s/appVersion: .*/appVersion: \"$VERSION\"/" helm/vote/Chart.yaml
          sed -i "s/appVersion: .*/appVersion: \"$VERSION\"/" helm/result/Chart.yaml
          sed -i "s/appVersion: .*/appVersion: \"$VERSION\"/" helm/worker/Chart.yaml

      - name: Build and push vote image
        uses: docker/build-push-action@v5
        with:
          context: ./app/vote
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vote:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vote:${{ steps.version.outputs.VERSION }}

      - name: Build and push result image
        uses: docker/build-push-action@v5
        with:
          context: ./app/result
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/result:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/result:${{ steps.version.outputs.VERSION }}

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./app/worker
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/worker:${{ steps.version.outputs.VERSION }}

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd app/vote
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        run: |
          cd app/vote
          pytest tests.py -v --cov=app --cov-report=term-missing --cov-fail-under=50

  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Lint Helm charts
        run: |
          helm lint ./helm/vote
          helm lint ./helm/result
          helm lint ./helm/worker
          helm lint ./helm/redis
          helm lint ./helm/db

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: Terraform validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

      - name: Scan Helm templates with kube-score
        run: |
          curl -L https://github.com/zegl/kube-score/releases/download/v1.18.0/kube-score_1.18.0_linux_amd64 -o kube-score
          chmod +x kube-score
          helm dependency build ./helm/vote
          helm dependency build ./helm/result
          helm template ./helm/vote | ./kube-score score - --ignore-test pod-networkpolicy --ignore-test container-security-context-privileged || true
          helm template ./helm/result | ./kube-score score - --ignore-test pod-networkpolicy --ignore-test container-security-context-privileged || true

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Trivy on vote image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/vote:latest
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Run Trivy on result image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/result:latest
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Run Trivy on worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/worker:latest
          format: table
          exit-code: 1
          severity: CRITICAL